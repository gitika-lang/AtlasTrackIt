<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtlasTrackIt — Prep Command Center</title>
<meta name="description" content="AtlasTrackIt — a single dashboard to track study progress, goals, habits and mock tests for any exam, certification or learning journey.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>
<body>
<div id="shell">
  <div id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.4" opacity=".55"/>
          <path d="M12 4.5 15 12l-3 7.5L9 12z" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-text"><div class="t1">AtlasTrackIt</div><div class="t2">Prep Command Center</div></div>
      <button id="sidebarCloseBtn" data-action="closeMobileSidebar" title="Close menu">✕</button>
    </div>
    <nav id="nav"></nav>
    <div class="sidefoot">
      <div class="streakpill">🔥 <span id="sideStreak">0 day streak</span></div>
      <button class="darkbtn" data-action="toggleDark">🌓 Toggle theme</button>
    </div>
  </div>
  <div id="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="hamburgerBtn" data-action="openMobileSidebar" title="Open menu">☰</button>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <div class="searchwrap">
        <span class="sic">🔍</span>
        <input id="searchInput" type="text" placeholder="Search topics, notes, formulas, vocab...">
        <div id="searchResults"></div>
      </div>
    </div>
    <div id="view"></div>
  </div>
</div>
<div id="sidebarOverlay"></div>
<div id="modalRoot"></div>
<script src="js/app.js"></script>
</body>
</html>
